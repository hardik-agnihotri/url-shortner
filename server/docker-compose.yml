version: '3.8'

services:
  # The Brain (Your Node App)
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - PORT=3000
    depends_on:
      - db
      - redis

  # The Speed (Redis)
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # The Memory (PostgreSQL)
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: your_user
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: url_shortener
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

